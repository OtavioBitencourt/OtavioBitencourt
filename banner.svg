<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0a"></stop>
      <stop offset="50%" stop-color="#151515"></stop>
      <stop offset="100%" stop-color="#0a0a0a"></stop>
    </linearGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8f6b20"></stop>
      <stop offset="50%" stop-color="#d4af37"></stop>
      <stop offset="100%" stop-color="#8f6b20"></stop>
    </linearGradient>

  </defs>

  <!-- Background -->

  <rect width="1200" height="300" fill="url(#bg)"></rect>

  <!-- Decorative Border -->

  <rect x="10" y="10" width="1180" height="280" rx="8" fill="none" stroke="url(#gold)" stroke-width="2"></rect>

  <!-- Shield -->

  <path d="M600 40
       L650 60
       L650 120
       Q650 170 600 210
       Q550 170 550 120
       L550 60
       Z" fill="#111" stroke="url(#gold)" stroke-width="3"></path>

  <text x="600" y="120" fill="#d4af37" font-size="42" text-anchor="middle" font-family="Georgia">
    OB
  </text>

  <!-- Name -->

  <text x="600" y="180" fill="#d4af37" font-size="48" text-anchor="middle" font-family="Georgia" font-weight="bold">
    OTÁVIO BITENCOURT
  </text>

  <!-- Subtitle -->

  <text x="600" y="220" fill="#bbbbbb" font-size="24" text-anchor="middle" font-family="Arial">
    Game Developer • C++ • Unreal Engine 5
  </text>

  <!-- Sword -->

  <g transform="translate(250 80)">

    <rect x="0" y="0" width="8" height="100" fill="#cccccc"></rect>

    <rect x="-15" y="90" width="40" height="8" fill="#d4af37"></rect>

  </g>

  <!-- Castle -->

  <g transform="translate(920 70)">

    <rect width="120" height="100" fill="#222"></rect>

    <rect x="10" y="-30" width="20" height="40" fill="#222"></rect>
    <rect x="50" y="-30" width="20" height="40" fill="#222"></rect>
    <rect x="90" y="-30" width="20" height="40" fill="#222"></rect>

  </g>

  <!-- Spark Animation -->

  <circle cx="300" cy="70" r="2" fill="#d4af37">

    <animate attributeName="cy" values="70;50;70" dur="2s" repeatCount="indefinite"></animate>

  </circle>

  <circle cx="900" cy="90" r="2" fill="#d4af37">

    <animate attributeName="cy" values="90;60;90" dur="3s" repeatCount="indefinite"></animate>

  </circle>

</svg>